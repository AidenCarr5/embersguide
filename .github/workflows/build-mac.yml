name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        run: npm run pack:mac -- --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder

      - name: Upload DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Embers-Tracker-macOS-DMG
          path: |
            dist/*.dmg
            dist/*.zip
            dist/builder-debug.yml
            dist/builder-effective-config.yaml
          if-no-files-found: warn
