name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        run: npm run pack:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Embers-Tracker-macOS-DMG
          path: dist/*.dmg
